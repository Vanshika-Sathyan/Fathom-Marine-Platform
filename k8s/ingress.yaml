apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fathom-ingress
  namespace: fathom
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: YOUR_ACM_CERT_ARN
spec:
  rules:
  - host: api.fathommarine.com
    http:
      paths:
      - path: /api/v1/credentials
        pathType: Prefix
        backend:
          service:
            name: credential-service
            port:
              number: 3001
      - path: /api/v1/courses
        pathType: Prefix
        backend:
          service:
            name: lms-service
            port:
              number: 3002
      - path: /api/v1/surveys
        pathType: Prefix
        backend:
          service:
            name: wellbeing-service
            port:
              number: 3003
      - path: /api/v1/ai
        pathType: Prefix
        backend:
          service:
            name: ai-service
            port:
              number: 3004