apiVersion: apps/v1
kind: Deployment
metadata:
  name: credential-service
  namespace: fathom
spec:
  replicas: 2
  selector:
    matchLabels:
      app: credential-service
  template:
    metadata:
      labels:
        app: credential-service
    spec:
      containers:
      - name: credential-service
        image: YOUR_ECR_URI/credential-service:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_NAME
          value: "fathom_db"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fathom-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: fathom-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: credential-service
  namespace: fathom
spec:
  selector:
    app: credential-service
  ports:
  - port: 3001
    targetPort: 3001